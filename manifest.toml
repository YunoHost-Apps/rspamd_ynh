#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json
packaging_format = 2

id = "rspamd"
name = "Rspamd"

description.en = "Spam filtering system"
description.fr = "Système pour filtrer les spams"

version = "4.1.1~ynh2"

maintainers = []

[upstream]
license = "Apache-2.0"
website = "https://rspamd.com/"
admindoc = "https://rspamd.com/doc"
code = "https://github.com/rspamd/rspamd"

[integration]
yunohost = '>= 12.1.17'
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false

ldap = "not_relevant"
sso = "not_relevant"

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]

[resources]

    [resources.sources.trixie]
    amd64.url = "https://rspamd.com/apt-stable/pool/main/r/rspamd/rspamd_4.1.1-1~0f29274~trixie_amd64.deb"
    amd64.sha256 = "e54b65d18bc5647f2f683f15cc2d31cf328f6ff1767393bae4ebb75d50d60cc0"
    arm64.url = "https://rspamd.com/apt-stable/pool/main/r/rspamd/rspamd_4.1.1-1~0f29274~trixie_arm64.deb"
    arm64.sha256 = "119debddb7dbc5e5494a93664fb0043da8f99e0ef0c1cd34a8dae6059443688c"
    extract = false
    rename = "rspamd.deb"

    [resources.sources.bookworm]
    amd64.url = "https://rspamd.com/apt-stable/pool/main/r/rspamd/rspamd_4.1.1-1~0f29274~bookworm_amd64.deb"
    amd64.sha256 = "9cdf36ca02cbe67fcda011da53aaac01a0543e316ef717691604e54bb37da767"
    arm64.url = "https://rspamd.com/apt-stable/pool/main/r/rspamd/rspamd_4.1.1-1~0f29274~bookworm_arm64.deb"
    arm64.sha256 = "6071608ba7b8c507042ad286fbb4b6840dcd0a1e7b2052331a36f63789e876e6"
    extract = false
    rename = "rspamd.deb"
    
    [resources.permissions]

    [resources.apt]
    packages = "redis-server, libhyperscan5, postfix, libsodium23, libsqlite3-0, libssl3, libarchive13, libbinutils"
