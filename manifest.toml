#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json
packaging_format = 2

id = "rspamd"
name = "Rspamd"

description.en = "Spam filtering system"
description.fr = "Système pour filtrer les spams"

version = "4.1.1~ynh1"

maintainers = []

[upstream]
license = "Apache-2.0"
website = "https://rspamd.com/"
admindoc = "https://rspamd.com/doc"
code = "https://github.com/rspamd/rspamd"

[integration]
yunohost = '>= 12.1.17'
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false

ldap = "not_relevant"
sso = "not_relevant"

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]

[resources]

    [resources.sources.trixie]
    amd64.url = "https://rspamd.com/apt-stable/pool/main/r/rspamd/rspamd_4.1.1-1~0f29274~trixie_amd64.deb"
    amd64.sha256 = "873ccecd34a68cc45e0b9b6e66f1d9b1939183a9187cfb26592e26888a7a167c"
    arm64.url = "https://rspamd.com/apt-stable/pool/main/r/rspamd/rspamd_4.1.1-1~0f29274~trixie_arm64.deb"
    arm64.sha256 = "9b1d91c70ba5b67411a1fd4be28c53033b6cde09b19dfe40db9158cc79c53a4b"
    extract = false
    rename = "rspamd.deb"

    [resources.sources.bookworm]
    amd64.url = "https://rspamd.com/apt-stable/pool/main/r/rspamd/rspamd_4.1.1-1~0f29274~bookworm_amd64.deb"
    amd64.sha256 = "ff690537842ea370d6875852b7ac932f62e51065255fc89302bdb121e49c3070"
    arm64.url = "https://rspamd.com/apt-stable/pool/main/r/rspamd/rspamd_4.1.1-1~0f29274~bookworm_arm64.deb"
    arm64.sha256 = "12a82a044b9e6fc5fdaf566c0a3ae74a415b14bde37c21c2cbfa8bedc47f6c87"
    extract = false
    rename = "rspamd.deb"
    
    [resources.permissions]

    [resources.apt]
    packages = "redis-server, libhyperscan5, postfix, libsodium23, libsqlite3-0, libssl3, libarchive13, libbinutils"
